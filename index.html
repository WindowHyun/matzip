<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>서울 맛집 지도 — 숙대·서울역·남대문</title>
  <!-- ✅ 네이버 지도 (Client ID) -->
  <script type="text/javascript"
    src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=cx4ana6ne2">
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f5f0; --surface: #ffffff; --ink: #1a1a1a; --muted: #6b6b6b;
      --noodle: #e85d26; --rice: #2c7a4b; --etc: #7b5ea7;
      --border: #e2ddd6; --shadow: 0 2px 12px rgba(0,0,0,.08);
      --danger: #e53e3e;
      --move: #2563eb;
    }
    html, body { height: 100%; font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--ink); }
    .app { display: flex; flex-direction: column; height: 100vh; }

    /* ── 헤더 ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; background: var(--surface);
      border-bottom: 1px solid var(--border); box-shadow: var(--shadow);
      z-index: 10; flex-shrink: 0;
    }
    header h1 { font-size: 15px; font-weight: 700; }
    header span { font-size: 11px; color: var(--muted); margin-top: 2px; display: block; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .nick-btn {
      display: flex; align-items: center; gap: 5px;
      background: #f0ede8; color: var(--ink); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px; font-size: 13px;
      font-family: inherit; cursor: pointer; transition: background .15s;
      max-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .nick-btn:hover { background: #e6e1d9; }
    .add-btn {
      display: flex; align-items: center; gap: 6px;
      background: var(--ink); color: #fff;
      border: none; border-radius: 8px; padding: 8px 14px;
      font-size: 13px; font-family: inherit; cursor: pointer;
      transition: opacity .15s; white-space: nowrap;
    }
    .add-btn:hover { opacity: .8; }

    /* ── 필터 ── */
    .filters {
      display: flex; gap: 8px; padding: 10px 16px; align-items: center;
      background: var(--surface); border-bottom: 1px solid var(--border);
      flex-shrink: 0; overflow-x: auto;
    }
    .filter-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 14px; border-radius: 20px;
      border: 1.5px solid transparent; font-size: 13px;
      font-family: inherit; cursor: pointer; white-space: nowrap; transition: all .15s;
    }
    .filter-btn.all    { background:#f0ede8; color:var(--ink); border-color:#ccc; }
    .filter-btn.noodle { background:#fff4f0; color:var(--noodle); border-color:var(--noodle); }
    .filter-btn.rice   { background:#f0faf4; color:var(--rice);   border-color:var(--rice); }
    .filter-btn.etc    { background:#f5f0ff; color:var(--etc);    border-color:var(--etc); }
    .filter-btn.active { font-weight: 700; }
    .filter-btn:not(.active) { opacity: .5; }
    .search-wrap { margin-left: auto; position: relative; flex-shrink: 0; }
    .search-wrap input {
      width: 200px; max-width: 40vw; padding: 7px 12px 7px 30px;
      border: 1.5px solid var(--border); border-radius: 20px;
      font-size: 13px; font-family: inherit; outline: none; transition: border-color .15s;
    }
    .search-wrap input:focus { border-color: var(--ink); }
    .search-wrap::before {
      content: '🔍'; position: absolute; left: 10px; top: 50%;
      transform: translateY(-50%); font-size: 12px; pointer-events: none;
    }

    /* ── 태그 필터 ── */
    .tag-filters {
      display: flex; gap: 6px; padding: 8px 16px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      flex-shrink: 0; overflow-x: auto;
    }
    .tag-chip {
      padding: 4px 11px; border-radius: 14px; border: 1.5px solid var(--border);
      background: #faf8f5; font-size: 12px; font-family: inherit;
      cursor: pointer; white-space: nowrap; transition: all .15s; color: var(--muted);
    }
    .tag-chip:hover { border-color: var(--ink); }
    .tag-chip.active { background: var(--ink); color: #fff; border-color: var(--ink); font-weight: 700; }

    .body { display: flex; flex: 1; overflow: hidden; }

    /* ── 사이드바 ── */
    .sidebar {
      width: 300px; flex-shrink: 0;
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .sidebar-header { padding: 12px 16px 8px; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--muted); flex-shrink: 0; }
    .list { overflow-y: auto; flex: 1; }
    .list-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 11px 16px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background .1s;
    }
    .list-item:hover { background: #faf8f5; }
    .list-item.active { background: #fdf6f2; }
    .dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
    .dot.noodle { background: var(--noodle); } .dot.rice { background: var(--rice); } .dot.etc { background: var(--etc); }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-size: 13px; font-weight: 700; }
    .item-menu { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
    .item-tag { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 10px; }
    .item-tag.noodle { background:#fff4f0; color:var(--noodle); }
    .item-tag.rice   { background:#f0faf4; color:var(--rice); }
    .item-tag.etc    { background:#f5f0ff; color:var(--etc); }
    .item-stars { font-size: 11px; color: #f6a623; }
    .item-tagbadge { font-size: 10px; color: var(--muted); background:#f0ede8; padding: 1px 6px; border-radius: 8px; }

    /* ── 지도 ── */
    #map { flex: 1; }

    /* ── 인포윈도우 ── */
    .iw {
      background: var(--surface); border-radius: 12px;
      padding: 14px 16px; min-width: 230px; max-width: 290px;
      box-shadow: 0 4px 20px rgba(0,0,0,.15);
      font-family: 'Noto Sans KR', sans-serif;
    }
    .iw-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; gap: 8px; }
    .iw-name {
      font-size: 14px; font-weight: 700;
      color: var(--ink); text-decoration: none;
    }
    .iw-name:hover { text-decoration: underline; color: #0070cc; }
    .iw-naver-badge {
      font-size: 10px; background: #03c75a; color: #fff;
      padding: 2px 6px; border-radius: 4px; white-space: nowrap;
    }
    .iw-avg { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .iw-avg-stars { font-size: 15px; color: #f6a623; line-height: 1; letter-spacing: 1px; }
    .iw-avg-label { font-size: 11px; color: var(--muted); }
    .iw-myrate { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
    .iw-myrate-label { font-size: 11px; color: var(--muted); }
    .star-row { display: flex; gap: 2px; }
    .star {
      font-size: 17px; cursor: pointer; color: #ddd; transition: color .1s;
      line-height: 1;
    }
    .star.on { color: #f6a623; }
    .iw-menu { font-size: 12px; color: var(--muted); line-height: 1.6; }
    .iw-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    .iw-tag { font-size: 10px; background:#f0ede8; color:var(--ink); padding: 2px 8px; border-radius: 10px; }
    .iw-comment { font-size: 11px; color: var(--ink); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); line-height: 1.6; }
    .iw-author { font-size: 10px; color: var(--muted); margin-top: 6px; }
    .iw-actions { display: flex; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
    .iw-del-btn {
      flex: 1; padding: 6px; border: 1.5px solid var(--danger); border-radius: 6px;
      background: #fff5f5; color: var(--danger); font-size: 12px;
      font-family: inherit; cursor: pointer; transition: background .1s;
    }
    .iw-del-btn:hover { background: #ffe0e0; }
    .iw-move-btn {
      flex: 1; padding: 6px; border: 1.5px solid #2563eb; border-radius: 6px;
      background: #eff6ff; color: #2563eb; font-size: 12px;
      font-family: inherit; cursor: pointer; transition: background .1s;
    }
    .iw-move-btn:hover { background: #dbeafe; }

    /* ── 모달 ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      z-index: 100; display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface); border-radius: 16px;
      padding: 24px; width: 360px; max-width: 90vw; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 8px 40px rgba(0,0,0,.2);
      transform: translateY(20px); transition: transform .2s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .modal p.sub { font-size: 12px; color: var(--muted); margin: -8px 0 16px; line-height: 1.5; }
    .form-row { margin-bottom: 12px; }
    .form-row label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 4px; }
    .form-row input, .form-row select, .form-row textarea {
      width: 100%; padding: 9px 12px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 13px; font-family: inherit;
      outline: none; transition: border-color .15s;
    }
    .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: var(--ink); }
    .form-row textarea { resize: vertical; min-height: 60px; }
    .form-hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .tag-toggles { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag-toggle {
      padding: 5px 11px; border-radius: 14px; border: 1.5px solid var(--border);
      background: #faf8f5; font-size: 12px; font-family: inherit; cursor: pointer;
      transition: all .15s; color: var(--muted);
    }
    .tag-toggle.on { background: var(--ink); color: #fff; border-color: var(--ink); font-weight: 700; }
    .map-pick-btn {
      width: 100%; padding: 8px; border: 1.5px dashed var(--border);
      border-radius: 8px; background: #faf8f5; font-size: 12px;
      font-family: inherit; cursor: pointer; color: var(--muted);
      transition: border-color .15s;
    }
    .map-pick-btn:hover { border-color: var(--ink); color: var(--ink); }
    .map-pick-btn.picking { border-color: var(--noodle); color: var(--noodle); background: #fff4f0; }
    .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
    .btn-cancel {
      flex: 1; padding: 10px; border: 1.5px solid var(--border);
      border-radius: 8px; background: #fff; font-size: 13px;
      font-family: inherit; cursor: pointer;
    }
    .btn-submit {
      flex: 2; padding: 10px; border: none;
      border-radius: 8px; background: var(--ink); color: #fff;
      font-size: 13px; font-family: inherit; cursor: pointer; font-weight: 700;
    }
    .btn-submit:hover { opacity: .85; }

    /* 지도 위 안내 배너 */
    #pick-banner {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      background: #2563eb; color: #fff; padding: 8px 16px;
      border-radius: 20px; font-size: 13px; z-index: 50;
      pointer-events: all; box-shadow: 0 2px 12px rgba(0,0,0,.2);
      display: none; align-items: center; gap: 4px; white-space: nowrap;
    }
    #pick-banner.show { display: flex; }

    /* 상태 토스트 */
    #toast {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--ink); color: #fff; padding: 10px 18px; border-radius: 22px;
      font-size: 13px; z-index: 80; box-shadow: 0 4px 16px rgba(0,0,0,.25);
      opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .map-wrap { flex: 1; position: relative; }
    @media (max-width: 640px) { .sidebar { display: none; } .search-wrap input { width: 130px; } }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <h1>🍜 서울 맛집 지도</h1>
      <span id="count-label">숙대 · 서울역 · 남대문 일대</span>
    </div>
    <div class="header-right">
      <button class="nick-btn" id="nick-btn" onclick="openNicknameModal()">👤 …</button>
      <button class="add-btn" onclick="openAddModal()">＋ 맛집 추가</button>
    </div>
  </header>

  <div class="filters">
    <button class="filter-btn all active" onclick="filterMarkers('all')">🗂 전체</button>
    <button class="filter-btn noodle" onclick="filterMarkers('noodle')">🍜 면류</button>
    <button class="filter-btn rice"   onclick="filterMarkers('rice')">🍚 밥류+a</button>
    <button class="filter-btn etc"    onclick="filterMarkers('etc')">🎪 기타</button>
    <div class="search-wrap">
      <input id="search-input" type="text" placeholder="매장·메뉴 검색" oninput="applyFilter()" />
    </div>
  </div>

  <div class="tag-filters" id="tag-filters"></div>

  <div class="body">
    <div class="sidebar">
      <div class="sidebar-header">목록 클릭 → 지도에서 확인</div>
      <div class="list" id="list"></div>
    </div>
    <div class="map-wrap">
      <div id="map" style="width:100%;height:100%;"></div>
      <div id="pick-banner">
        <span id="pick-banner-text"></span>
        &nbsp;
        <button id="pick-confirm-btn" onclick="confirmDrag()" style="background:rgba(255,255,255,.9);border:none;color:#1a1a1a;border-radius:6px;padding:4px 12px;cursor:pointer;font-size:12px;font-weight:700;">✅ 확인</button>
        <button onclick="cancelDrag()" style="background:rgba(255,255,255,.25);border:none;color:#fff;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;margin-left:4px;">✕ 취소</button>
      </div>
      <div id="toast"></div>
    </div>
  </div>
</div>

<!-- 추가 모달 -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2>🍽 맛집 추가</h2>
    <div class="form-row">
      <label>매장명 *</label>
      <input id="f-name" placeholder="예) 후암 쌀국수" />
    </div>
    <div class="form-row">
      <label>카테고리 *</label>
      <select id="f-cat">
        <option value="noodle">🍜 면류</option>
        <option value="rice">🍚 밥류+a</option>
        <option value="etc">🎪 기타</option>
      </select>
    </div>
    <div class="form-row">
      <label>메뉴 및 금액</label>
      <input id="f-menu" placeholder="예) 소고기 쌀국수 9,500원" />
    </div>
    <div class="form-row">
      <label>코멘트</label>
      <textarea id="f-comment" placeholder="맛, 위치, 팁 등 자유롭게"></textarea>
    </div>
    <div class="form-row">
      <label>태그</label>
      <div class="tag-toggles" id="f-tags"></div>
    </div>
    <div class="form-row">
      <label>위치 선택 *</label>
      <button class="map-pick-btn" id="pick-btn" onclick="startPicking()">🗺 핀 드래그로 위치 선택</button>
      <div class="form-hint" id="pick-hint">버튼을 누르면 지도에 드래그 핀이 생깁니다</div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAddModal()">취소</button>
      <button class="btn-submit" onclick="submitAdd()">추가하기</button>
    </div>
  </div>
</div>

<!-- 닉네임 모달 -->
<div class="modal-overlay" id="nick-overlay">
  <div class="modal">
    <h2>👤 닉네임 설정</h2>
    <p class="sub">맛집 추가·별점에 닉네임이 함께 기록됩니다.</p>
    <div class="form-row">
      <label>닉네임 *</label>
      <input id="f-nick" maxlength="20" placeholder="예) 영희" onkeydown="if(event.key==='Enter')saveNickname()" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="nick-cancel" onclick="closeNicknameModal()">취소</button>
      <button class="btn-submit" onclick="saveNickname()">저장</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

// ─────────────────────────────────────────────
// Supabase 설정
// ─────────────────────────────────────────────
const SUPABASE_URL = 'https://kvxprsqdqiazxpcdhfiu.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2eHByc3FkcWlhenhwY2RoZml1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NzA2MzQsImV4cCI6MjA5NzM0NjYzNH0.1FYKu070t22fYIzJa_nx3oFrSugGiOu_VEWSOpvWpFY';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ─────────────────────────────────────────────
// 태그 시스템
// ─────────────────────────────────────────────
const TAGS = [
  { id: 'waiting',  label: '⏳ 웨이팅 있음' },
  { id: 'solo',     label: '🙋 혼밥 가능'   },
  { id: 'cheap',    label: '💸 가성비'       },
  { id: 'spicy',    label: '🌶 매운맛'       },
  { id: 'takeout',  label: '🥡 포장 가능'   },
  { id: 'open24',   label: '🕛 24시 영업'   },
];
const TAG_LABEL = Object.fromEntries(TAGS.map(t => [t.id, t.label]));

// ─────────────────────────────────────────────
// 기본 데이터 (Supabase 로드 실패 시 폴백)
// ─────────────────────────────────────────────
const DEFAULT_PLACES = [
  { id:'d1', cat:'noodle', name:'후암 쌀국수 (아시안)', menu:'소고기 쌀국수 9,500원', comment:'후암동 / 완자도 넣어줌 맛있음', lat:37.5485, lng:126.9759, tags:[], added_by:'기본데이터' },
];

// ─────────────────────────────────────────────
// 상태
// ─────────────────────────────────────────────
let places = [];
let summaries = {};     // place_id → { average, count }
let myRatings = {};     // place_id → score
let currentUserId = null;
let nickname = localStorage.getItem('matzip_nickname') || '';
let readOnly = false;   // 익명 로그인 실패 시 읽기 전용

let activeFilter = 'all';
let activeTagFilter = null;
let openIW = null;
let openPlaceId = null;
let activeListItem = null;
const markerMap = {}; // id → { marker, iw }

// ─────────────────────────────────────────────
// 지도 초기화
// ─────────────────────────────────────────────
const map = new naver.maps.Map('map', {
  center: new naver.maps.LatLng(37.5545, 126.9730),
  zoom: 15,
  mapTypeId: naver.maps.MapTypeId.NORMAL
});

naver.maps.Event.addListener(map, 'click', () => {
  if (!movingId && !isDraggingNew) {
    if (openIW) { openIW.close(); openIW = null; openPlaceId = null; }
    if (activeListItem) { activeListItem.classList.remove('active'); activeListItem = null; }
  }
});

// ─────────────────────────────────────────────
// 토스트
// ─────────────────────────────────────────────
let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

// ─────────────────────────────────────────────
// 별점 헬퍼
// ─────────────────────────────────────────────
function avgStars(avg) {
  const n = Math.round(avg || 0);
  return '★'.repeat(n) + '☆'.repeat(5 - n);
}

// ─────────────────────────────────────────────
// 인포윈도우 컨텐츠
// ─────────────────────────────────────────────
function buildIwContent(p) {
  const naverSearchUrl = `https://map.naver.com/v5/search/${encodeURIComponent(p.name)}`;
  const sum = summaries[p.id];
  const avg = sum ? sum.average : 0;
  const cnt = sum ? sum.count : 0;
  const mine = myRatings[p.id] || 0;

  const myStars = [1,2,3,4,5].map(n =>
    `<span class="star ${n<=mine?'on':''}" onclick="setRating('${p.id}',${n})" data-id="${p.id}" data-n="${n}">★</span>`
  ).join('');

  const tagBadges = (p.tags && p.tags.length)
    ? `<div class="iw-tags">${p.tags.map(t => `<span class="iw-tag">${TAG_LABEL[t] || t}</span>`).join('')}</div>`
    : '';

  return `
    <div class="iw">
      <div class="iw-title-row">
        <a class="iw-name" href="${naverSearchUrl}" target="_blank" rel="noopener">${p.name}</a>
        <a href="${naverSearchUrl}" target="_blank" rel="noopener" class="iw-naver-badge">네이버지도</a>
      </div>
      <div class="iw-avg">
        <span class="iw-avg-stars">${avgStars(avg)}</span>
        <span class="iw-avg-label">${cnt > 0 ? `${avg}점 (${cnt}명)` : '평가 없음'}</span>
      </div>
      <div class="iw-myrate">
        <span class="iw-myrate-label">내 평가:</span>
        <div class="star-row" id="stars-${p.id}">${myStars}</div>
      </div>
      <div class="iw-menu">${p.menu || ''}</div>
      ${tagBadges}
      ${p.comment ? `<div class="iw-comment">💬 ${p.comment}</div>` : ''}
      <div class="iw-author">추가한 사람: ${p.added_by || '익명'}</div>
      <div class="iw-actions">
        <button class="iw-move-btn" onclick="startMovePlace('${p.id}')">📍 위치 수정</button>
        <button class="iw-del-btn" onclick="deletePlace('${p.id}')">🗑 삭제</button>
      </div>
    </div>`;
}

// ─────────────────────────────────────────────
// 렌더링
// ─────────────────────────────────────────────
function renderAll() {
  Object.values(markerMap).forEach(({ marker, iw }) => { iw.close(); marker.setMap(null); });
  Object.keys(markerMap).forEach(k => delete markerMap[k]);

  const listEl = document.getElementById('list');
  listEl.innerHTML = '';

  places.forEach(p => {
    const icon = {
      content: `<div style="width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 6px rgba(0,0,0,.25);cursor:pointer;background:${p.cat==='noodle'?'#e85d26':p.cat==='rice'?'#2c7a4b':'#7b5ea7'}">${p.cat==='noodle'?'🍜':p.cat==='rice'?'🍚':'🎪'}</div>`,
      anchor: new naver.maps.Point(15, 30)
    };
    const marker = new naver.maps.Marker({
      position: new naver.maps.LatLng(p.lat, p.lng),
      map, icon, title: p.name
    });

    const iw = new naver.maps.InfoWindow({
      content: buildIwContent(p),
      borderWidth: 0, backgroundColor: 'transparent',
      anchorSize: new naver.maps.Size(0,0),
      pixelOffset: new naver.maps.Point(0, -36)
    });

    naver.maps.Event.addListener(marker, 'click', () => openInfo(p.id));
    markerMap[p.id] = { marker, iw };

    // 리스트 아이템
    const sum = summaries[p.id];
    const item = document.createElement('div');
    item.className = 'list-item';
    item.dataset.id = p.id;
    const tagBadgesHtml = (p.tags || []).slice(0,3)
      .map(t => `<span class="item-tagbadge">${TAG_LABEL[t] || t}</span>`).join('');
    item.innerHTML = `
      <div class="dot ${p.cat}"></div>
      <div class="item-info">
        <div class="item-name">${p.name}</div>
        <div class="item-menu">${p.menu || ''}</div>
        <div class="item-meta">
          <span class="item-tag ${p.cat}">${p.cat==='noodle'?'면류':p.cat==='rice'?'밥류+a':'기타'}</span>
          ${sum && sum.count>0 ? `<span class="item-stars">${avgStars(sum.average)}</span><span class="item-tagbadge">${sum.average}</span>` : ''}
          ${tagBadgesHtml}
        </div>
      </div>`;
    item.onclick = () => openInfo(p.id);
    listEl.appendChild(item);
  });

  applyFilter();
  updateCountLabel();

  // 열려있던 인포윈도우 복원
  if (openPlaceId && markerMap[openPlaceId]) openInfo(openPlaceId);
}

function updateCountLabel() {
  let visible = 0;
  const query = document.getElementById('search-input').value.trim().toLowerCase();
  places.forEach(p => {
    const matchCat  = activeFilter === 'all' || p.cat === activeFilter;
    const matchTag  = !activeTagFilter || (p.tags || []).includes(activeTagFilter);
    const matchName = !query || p.name.toLowerCase().includes(query) || (p.menu||'').toLowerCase().includes(query);
    if (matchCat && matchTag && matchName) visible++;
  });
  document.getElementById('count-label').textContent =
    `숙대 · 서울역 · 남대문 일대 · ${visible}곳`;
}

// ─────────────────────────────────────────────
// 인포윈도우
// ─────────────────────────────────────────────
function openInfo(id) {
  if (openIW) openIW.close();
  if (activeListItem) activeListItem.classList.remove('active');

  const entry = markerMap[id];
  if (!entry) return;
  const { marker, iw } = entry;
  iw.open(map, marker);
  openIW = iw;
  openPlaceId = id;
  map.panTo(marker.getPosition());

  const item = document.querySelector(`.list-item[data-id="${id}"]`);
  if (item) { item.classList.add('active'); item.scrollIntoView({ block:'nearest' }); activeListItem = item; }
}

// ─────────────────────────────────────────────
// 별점 (멀티유저 평균)
// ─────────────────────────────────────────────
async function setRating(id, n) {
  if (readOnly) { toast('별점은 로그인(익명) 활성화 후 가능해요'); return; }
  myRatings[id] = n;
  // 내 별점 UI 즉시 반영
  const starsEl = document.getElementById(`stars-${id}`);
  if (starsEl) starsEl.querySelectorAll('.star').forEach(s => s.classList.toggle('on', parseInt(s.dataset.n) <= n));

  const { error } = await supabase.from('ratings').upsert(
    { place_id: id, user_id: currentUserId, score: n },
    { onConflict: 'place_id,user_id' }
  );
  if (error) { toast('별점 저장 실패'); console.error(error); return; }

  // 평균 갱신
  const { data } = await supabase.from('rating_summary')
    .select('average, count').eq('place_id', id).maybeSingle();
  summaries[id] = data ? { average: Number(data.average), count: data.count } : { average: n, count: 1 };
  refreshRatingUI(id);
  toast('별점 저장됨 ⭐');
}

function refreshRatingUI(id) {
  const entry = markerMap[id];
  const p = places.find(x => x.id === id);
  if (entry && p) {
    entry.iw.setContent(buildIwContent(p));
    if (openPlaceId === id) entry.iw.open(map, entry.marker);
  }
  const meta = document.querySelector(`.list-item[data-id="${id}"] .item-meta`);
  const sum = summaries[id];
  if (meta && sum) {
    const existing = meta.querySelector('.item-stars');
    if (existing) existing.outerHTML = `<span class="item-stars">${avgStars(sum.average)}</span>`;
  }
}

// ─────────────────────────────────────────────
// 삭제
// ─────────────────────────────────────────────
async function deletePlace(id) {
  if (readOnly) { toast('삭제는 로그인(익명) 활성화 후 가능해요'); return; }
  if (!confirm('이 맛집을 삭제할까요?')) return;
  if (openIW) { openIW.close(); openIW = null; openPlaceId = null; }
  const { error } = await supabase.from('places').delete().eq('id', id);
  if (error) { toast('삭제 실패'); console.error(error); return; }
  places = places.filter(p => p.id !== id);
  renderAll();
  toast('삭제됨');
}

// ─────────────────────────────────────────────
// 위치 수정 (드래그)
// ─────────────────────────────────────────────
let movingId = null;

function startMovePlace(id) {
  if (readOnly) { toast('위치 수정은 로그인(익명) 활성화 후 가능해요'); return; }
  if (openIW) { openIW.close(); openIW = null; openPlaceId = null; }
  movingId = id;
  const place = places.find(p => p.id === id);
  if (!place) return;
  const { marker } = markerMap[id];

  marker.setDraggable(true);
  marker.setCursor('grab');
  const el = marker.getElement();
  if (el) { el.style.filter = 'drop-shadow(0 0 8px #2563eb)'; el.style.transform = 'scale(1.3)'; el.style.transition = 'transform .15s'; }

  document.getElementById('pick-banner-text').textContent =
    `📍 [${place.name}] 핀을 드래그해서 새 위치로 이동하세요`;
  document.getElementById('pick-confirm-btn').textContent = '✅ 저장';
  document.getElementById('pick-banner').classList.add('show');
}

async function confirmDrag() {
  if (movingId) {
    const { marker } = markerMap[movingId];
    const pos = marker.getPosition();
    const place = places.find(p => p.id === movingId);
    const savedId = movingId;
    if (place) {
      place.lat = pos.lat();
      place.lng = pos.lng();
      const { error } = await supabase.from('places')
        .update({ lat: place.lat, lng: place.lng }).eq('id', savedId);
      if (error) { toast('위치 저장 실패'); console.error(error); }
      else toast('위치 저장됨 📍');
    }
    stopMove();
    renderAll();
    setTimeout(() => { if (savedId) openInfo(savedId); }, 200);
  } else if (isDraggingNew) {
    const pos = tempDragMarker.getPosition();
    pickedLat = pos.lat();
    pickedLng = pos.lng();
    stopAddDrag();
    document.getElementById('modal-overlay').classList.add('open');
    document.getElementById('pick-hint').textContent = `📍 ${pickedLat.toFixed(6)}, ${pickedLng.toFixed(6)}`;
    document.getElementById('pick-btn').textContent = '✅ 위치 재조정';
    document.getElementById('pick-btn').classList.remove('picking');
  }
}

function cancelDrag() {
  if (movingId) {
    const place = places.find(p => p.id === movingId);
    if (place) markerMap[movingId].marker.setPosition(new naver.maps.LatLng(place.lat, place.lng));
    stopMove();
  } else if (isDraggingNew) {
    stopAddDrag();
    document.getElementById('modal-overlay').classList.add('open');
  }
}

function stopMove() {
  if (movingId && markerMap[movingId]) {
    const { marker } = markerMap[movingId];
    marker.setDraggable(false);
    marker.setCursor('pointer');
    const el = marker.getElement();
    if (el) { el.style.filter = ''; el.style.transform = ''; }
  }
  movingId = null;
  document.getElementById('pick-banner').classList.remove('show');
}

// ─────────────────────────────────────────────
// 필터 + 검색 + 태그
// ─────────────────────────────────────────────
function filterMarkers(cat) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.classList.contains(cat) || (cat==='all' && b.classList.contains('all')));
  });
  applyFilter();
}

function filterByTag(tagId) {
  activeTagFilter = (activeTagFilter === tagId) ? null : tagId;
  renderTagFilters();
  applyFilter();
}

function applyFilter() {
  const query = document.getElementById('search-input').value.trim().toLowerCase();
  places.forEach(p => {
    const matchCat  = activeFilter === 'all' || p.cat === activeFilter;
    const matchTag  = !activeTagFilter || (p.tags || []).includes(activeTagFilter);
    const matchName = !query || p.name.toLowerCase().includes(query) || (p.menu||'').toLowerCase().includes(query);
    const show = matchCat && matchTag && matchName;
    markerMap[p.id]?.marker.setVisible(show);
    const item = document.querySelector(`.list-item[data-id="${p.id}"]`);
    if (item) item.style.display = show ? '' : 'none';
  });
  if (openIW) { openIW.close(); openIW = null; openPlaceId = null; }
  updateCountLabel();
}

function renderTagFilters() {
  const wrap = document.getElementById('tag-filters');
  wrap.innerHTML = TAGS.map(t =>
    `<button class="tag-chip ${activeTagFilter===t.id?'active':''}" onclick="filterByTag('${t.id}')">${t.label}</button>`
  ).join('');
}

// ─────────────────────────────────────────────
// 추가 모달
// ─────────────────────────────────────────────
let isDraggingNew = false;
let tempDragMarker = null;
let pickedLat = null, pickedLng = null;
let selectedTags = [];

function renderTagToggles() {
  const wrap = document.getElementById('f-tags');
  wrap.innerHTML = TAGS.map(t =>
    `<button type="button" class="tag-toggle ${selectedTags.includes(t.id)?'on':''}" data-tag="${t.id}" onclick="toggleTag('${t.id}')">${t.label}</button>`
  ).join('');
}

function toggleTag(tagId) {
  if (selectedTags.includes(tagId)) selectedTags = selectedTags.filter(t => t !== tagId);
  else selectedTags.push(tagId);
  renderTagToggles();
}

function openAddModal() {
  selectedTags = [];
  renderTagToggles();
  document.getElementById('modal-overlay').classList.add('open');
}

function closeAddModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  stopAddDrag();
  document.getElementById('f-name').value = '';
  document.getElementById('f-menu').value = '';
  document.getElementById('f-comment').value = '';
  selectedTags = [];
  pickedLat = null; pickedLng = null;
  document.getElementById('pick-hint').textContent = '버튼을 누르면 지도에 드래그 핀이 생깁니다';
  document.getElementById('pick-btn').textContent = '🗺 핀 드래그로 위치 선택';
  document.getElementById('pick-btn').classList.remove('picking');
}

function startPicking() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('pick-btn').classList.add('picking');
  isDraggingNew = true;
  const center = map.getCenter();
  if (tempDragMarker) tempDragMarker.setMap(null);

  tempDragMarker = new naver.maps.Marker({
    position: center, map, draggable: true, cursor: 'grab',
    icon: {
      content: `<div style="width:36px;height:36px;border-radius:50%;background:#2563eb;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 0 4px rgba(37,99,235,.3),0 4px 12px rgba(0,0,0,.3);cursor:grab;transition:transform .1s;">📍</div>`,
      anchor: new naver.maps.Point(18, 18)
    }
  });

  naver.maps.Event.addListener(tempDragMarker, 'dragstart', () => { tempDragMarker.getElement().style.transform = 'scale(1.15)'; });
  naver.maps.Event.addListener(tempDragMarker, 'dragend', () => {
    tempDragMarker.getElement().style.transform = '';
    const pos = tempDragMarker.getPosition();
    document.getElementById('pick-hint').textContent = `📍 ${pos.lat().toFixed(6)}, ${pos.lng().toFixed(6)}`;
  });

  document.getElementById('pick-banner-text').textContent = '📍 파란 핀을 드래그해서 위치를 조정하세요';
  document.getElementById('pick-confirm-btn').textContent = '✅ 확인';
  document.getElementById('pick-banner').classList.add('show');
}

function stopAddDrag() {
  isDraggingNew = false;
  if (tempDragMarker) { tempDragMarker.setMap(null); tempDragMarker = null; }
  document.getElementById('pick-banner').classList.remove('show');
}

async function submitAdd() {
  const name    = document.getElementById('f-name').value.trim();
  const cat     = document.getElementById('f-cat').value;
  const menu    = document.getElementById('f-menu').value.trim();
  const comment = document.getElementById('f-comment').value.trim();

  if (!name) { alert('매장명을 입력해주세요.'); return; }
  if (!pickedLat || !pickedLng) { alert('위치를 먼저 선택해주세요.'); return; }
  if (readOnly) { toast('추가는 로그인(익명) 활성화 후 가능해요'); return; }

  const newPlace = {
    id: 'u' + Date.now(),
    name, cat, lat: pickedLat, lng: pickedLng, menu, comment,
    tags: selectedTags.slice(), added_by: nickname || '익명'
  };

  const { error } = await supabase.from('places').insert(newPlace);
  if (error) { alert('추가 실패: ' + error.message); return; }

  upsertLocalPlace(newPlace);
  closeAddModal();
  renderAll();
  setTimeout(() => openInfo(newPlace.id), 300);
  toast('맛집 추가됨 🍽');
}

// ─────────────────────────────────────────────
// 닉네임
// ─────────────────────────────────────────────
function updateNickBtn() {
  document.getElementById('nick-btn').textContent = '👤 ' + (nickname || '익명');
}

function openNicknameModal() {
  document.getElementById('f-nick').value = nickname || '';
  document.getElementById('nick-cancel').style.display = nickname ? '' : 'none';
  document.getElementById('nick-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-nick').focus(), 100);
}

function closeNicknameModal() {
  if (!nickname) return; // 최초 설정 전에는 닫기 불가
  document.getElementById('nick-overlay').classList.remove('open');
}

function saveNickname() {
  const val = document.getElementById('f-nick').value.trim();
  if (!val) { alert('닉네임을 입력해주세요.'); return; }
  nickname = val;
  localStorage.setItem('matzip_nickname', nickname);
  updateNickBtn();
  document.getElementById('nick-overlay').classList.remove('open');
  toast('닉네임: ' + nickname);
}

// ─────────────────────────────────────────────
// 데이터 로드
// ─────────────────────────────────────────────
function upsertLocalPlace(p) {
  const i = places.findIndex(x => x.id === p.id);
  if (i >= 0) places[i] = { ...places[i], ...p };
  else places.push(p);
}

async function loadPlaces() {
  const { data, error } = await supabase.from('places').select('*').order('created_at', { ascending: true });
  if (error || !data) { console.error('places load error', error); if (!places.length) places = JSON.parse(JSON.stringify(DEFAULT_PLACES)); return; }
  places = data;
}

async function loadSummaries() {
  const { data } = await supabase.from('rating_summary').select('place_id, average, count');
  summaries = {};
  (data || []).forEach(s => { summaries[s.place_id] = { average: Number(s.average), count: s.count }; });
}

async function loadMyRatings() {
  if (!currentUserId) { myRatings = {}; return; }
  const { data } = await supabase.from('ratings').select('place_id, score').eq('user_id', currentUserId);
  myRatings = {};
  (data || []).forEach(r => { myRatings[r.place_id] = r.score; });
}

// 실시간 변경 → 디바운스 후 전체 새로고침
let refreshTimer = null;
function scheduleRefresh() {
  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(async () => {
    await Promise.all([loadPlaces(), loadSummaries(), loadMyRatings()]);
    renderAll();
  }, 350);
}

function subscribeRealtime() {
  supabase.channel('matzip-realtime')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'places' }, scheduleRefresh)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'ratings' }, scheduleRefresh)
    .subscribe();
}

// ─────────────────────────────────────────────
// 초기화
// ─────────────────────────────────────────────
async function init() {
  renderTagFilters();
  updateNickBtn();

  if (!nickname) openNicknameModal();

  // 익명 로그인
  try {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) {
      const { error } = await supabase.auth.signInAnonymously();
      if (error) throw error;
    }
    const { data: { user: u2 } } = await supabase.auth.getUser();
    currentUserId = u2?.id || null;
    if (!currentUserId) readOnly = true;
  } catch (e) {
    console.warn('익명 로그인 실패 — 읽기 전용 모드', e);
    readOnly = true;
    toast('읽기 전용 모드 (익명 로그인 비활성)');
  }

  await Promise.all([loadPlaces(), loadSummaries(), loadMyRatings()]);
  renderAll();
  subscribeRealtime();
}

// ─────────────────────────────────────────────
// 전역 핸들러 등록 (onclick용)
// ─────────────────────────────────────────────
Object.assign(window, {
  filterMarkers, filterByTag, openInfo, setRating, deletePlace,
  startMovePlace, confirmDrag, cancelDrag, applyFilter,
  openAddModal, closeAddModal, startPicking, submitAdd, toggleTag,
  openNicknameModal, closeNicknameModal, saveNickname
});

init();
</script>
</body>
</html>
