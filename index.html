<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>서울 맛집 지도 — 숙대·서울역·남대문</title>

  <!-- 테마 선적용 (깜빡임 방지) -->
  <script>try{var _t=localStorage.getItem('matzip_theme');if(_t)document.documentElement.setAttribute('data-theme',_t);}catch(e){}</script>

  <!-- 리소스 힌트 (preconnect) -->
  <link rel="preconnect" href="https://oapi.map.naver.com" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://kvxprsqdqiazxpcdhfiu.supabase.co" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#e85d26" />
  <link rel="apple-touch-icon" href="icon-180.png" />

  <!-- ✅ 네이버 지도 (Client ID) -->
  <script type="text/javascript"
    src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=cx4ana6ne2">
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f5f0; --surface: #ffffff; --ink: #1a1a1a; --muted: #6b6b6b;
      --noodle: #e85d26; --rice: #2c7a4b; --etc: #7b5ea7;
      --border: #e2ddd6; --shadow: 0 2px 12px rgba(0,0,0,.08);
      --danger: #e53e3e;
      --move: #2563eb;
      --accent: #1a1a1a;        /* 버튼 배경 (다크모드에서 분리) */
      --soft: #faf8f5;          /* 옅은 표면 */
      --chip: #f0ede8;          /* 칩/뱃지 배경 */
    }
    [data-theme="dark"] {
      --bg: #15140f; --surface: #1f1d18; --ink: #f0ede6; --muted: #a8a294;
      --border: #34312a; --shadow: 0 2px 12px rgba(0,0,0,.5);
      --accent: #e85d26; --soft: #26241e; --chip: #2c2922;
    }
    html, body { height: 100%; font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--ink); }
    html { -webkit-tap-highlight-color: transparent; }
    button, select, .list-item, .sheet-handle, .sidebar-header, .star { touch-action: manipulation; }
    .app { display: flex; flex-direction: column; height: 100vh; }

    /* ── 헤더 ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; background: var(--surface);
      border-bottom: 1px solid var(--border); box-shadow: var(--shadow);
      z-index: 10; flex-shrink: 0;
    }
    header h1 { font-size: 15px; font-weight: 700; }
    header span { font-size: 11px; color: var(--muted); margin-top: 2px; display: block; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .icon-btn {
      display: flex; align-items: center; justify-content: center;
      width: 38px; height: 38px; flex-shrink: 0;
      background: var(--chip); color: var(--ink); border: 1px solid var(--border);
      border-radius: 8px; font-size: 16px; font-family: inherit; cursor: pointer;
      transition: background .15s;
    }
    .icon-btn:hover { filter: brightness(.96); }
    .nick-btn {
      display: flex; align-items: center; gap: 5px;
      background: var(--chip); color: var(--ink); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px; font-size: 13px;
      font-family: inherit; cursor: pointer; transition: background .15s;
      max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .nick-btn:hover { filter: brightness(.96); }
    .add-btn {
      display: flex; align-items: center; gap: 6px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px; padding: 8px 14px;
      font-size: 13px; font-family: inherit; cursor: pointer;
      transition: opacity .15s; white-space: nowrap;
    }
    .add-btn:hover { opacity: .8; }
    .rec-btn {
      display: flex; align-items: center; gap: 6px;
      background: var(--noodle); color: #fff;
      border: none; border-radius: 8px; padding: 8px 14px;
      font-size: 13px; font-family: inherit; cursor: pointer;
      transition: opacity .15s; white-space: nowrap;
    }
    .rec-btn:hover { opacity: .85; }

    /* ── 추천 모달 ── */
    .rec-cats { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .rec-cat {
      flex: 1; min-width: 70px; padding: 10px 8px; border-radius: 10px;
      border: 1.5px solid var(--border); background: var(--soft); color: var(--ink);
      font-size: 13px; font-family: inherit; cursor: pointer; transition: all .15s;
    }
    .rec-cat:hover { border-color: var(--ink); }
    .rec-cat.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }
    .rec-near { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); margin-bottom: 14px; cursor: pointer; }
    .rec-result {
      border: 1.5px solid var(--border); border-radius: 12px;
      padding: 16px; background: var(--soft); margin-bottom: 14px; min-height: 80px;
    }
    .rec-empty { font-size: 13px; color: var(--muted); text-align: center; padding: 18px 0; line-height: 1.6; }
    .rec-card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
    .rec-emoji { font-size: 22px; }
    .rec-name { font-size: 16px; font-weight: 700; }
    .rec-cat-tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; }
    .rec-cat-tag.noodle { background:#fff4f0; color:var(--noodle); }
    .rec-cat-tag.rice   { background:#f0faf4; color:var(--rice); }
    .rec-cat-tag.etc    { background:#f5f0ff; color:var(--etc); }
    .rec-rating { font-size: 12px; color: #f6a623; margin-bottom: 6px; }
    .rec-rating .cnt { color: var(--muted); margin-left: 4px; }
    .rec-dist { font-size: 11px; color: var(--move); margin-bottom: 6px; }
    .rec-menu { font-size: 12px; color: var(--muted); line-height: 1.6; }
    .rec-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    .rec-tag { font-size: 10px; background:var(--chip); color:var(--ink); padding: 2px 8px; border-radius: 10px; }
    .rec-comment { font-size: 11px; color: var(--ink); margin-top: 8px; line-height: 1.6; }

    /* 룰렛 스핀 연출 */
    .rec-spin {
      position: relative; height: 56px; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px;
      -webkit-mask-image: linear-gradient(transparent, #000 30%, #000 70%, transparent);
              mask-image: linear-gradient(transparent, #000 30%, #000 70%, transparent);
    }
    .rec-spin-name {
      font-size: 16px; font-weight: 700; white-space: nowrap;
      display: flex; align-items: center; gap: 8px;
      animation: rollFlick .09s linear;
    }
    @keyframes rollFlick {
      from { transform: translateY(-26px); opacity: 0; }
      60%  { opacity: 1; }
      to   { transform: translateY(0); opacity: 1; }
    }
    .rec-spin-cap { text-align: center; font-size: 12px; color: var(--noodle); font-weight: 700; margin-top: 8px; letter-spacing: 2px; }
    .rec-card-reveal { animation: revealPop .35s cubic-bezier(.2,1.2,.4,1); }
    @keyframes revealPop {
      from { transform: scale(.9); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    /* ── 필터 ── */
    .filters {
      display: flex; gap: 8px; padding: 10px 16px; align-items: center;
      background: var(--surface); border-bottom: 1px solid var(--border);
      flex-shrink: 0; overflow-x: auto;
    }
    .filter-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 14px; border-radius: 20px;
      border: 1.5px solid transparent; font-size: 13px;
      font-family: inherit; cursor: pointer; white-space: nowrap; transition: all .15s;
    }
    .filter-btn.all    { background:var(--chip); color:var(--ink); border-color:#ccc; }
    .filter-btn.noodle { background:#fff4f0; color:var(--noodle); border-color:var(--noodle); }
    .filter-btn.rice   { background:#f0faf4; color:var(--rice);   border-color:var(--rice); }
    .filter-btn.etc    { background:#f5f0ff; color:var(--etc);    border-color:var(--etc); }
    .filter-btn.active { font-weight: 700; }
    .filter-btn:not(.active) { opacity: .5; }
    .search-wrap { margin-left: auto; position: relative; flex-shrink: 0; }
    .search-wrap input {
      width: 200px; max-width: 40vw; padding: 7px 12px 7px 30px;
      border: 1.5px solid var(--border); border-radius: 20px;
      font-size: 13px; font-family: inherit; outline: none; transition: border-color .15s;
      background: var(--surface); color: var(--ink);
    }
    .search-wrap input:focus { border-color: var(--ink); }
    .search-wrap::before {
      content: '🔍'; position: absolute; left: 10px; top: 50%;
      transform: translateY(-50%); font-size: 12px; pointer-events: none;
    }

    /* ── 태그 필터 ── */
    .tag-filters {
      display: flex; gap: 6px; padding: 8px 16px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      flex-shrink: 0; overflow-x: auto;
    }
    .tag-chip {
      padding: 4px 11px; border-radius: 14px; border: 1.5px solid var(--border);
      background: var(--soft); font-size: 12px; font-family: inherit;
      cursor: pointer; white-space: nowrap; transition: all .15s; color: var(--muted);
    }
    .tag-chip:hover { border-color: var(--ink); }
    .tag-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }

    .body { display: flex; flex: 1; overflow: hidden; position: relative; }

    /* ── 사이드바 ── */
    .sidebar {
      width: 300px; flex-shrink: 0;
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .sidebar-header {
      padding: 12px 16px 8px; border-bottom: 1px solid var(--border);
      font-size: 12px; color: var(--muted); flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .sheet-handle { display: none; }
    .sort-near-btn {
      background: var(--soft); border: 1.5px solid var(--border); color: var(--muted);
      border-radius: 14px; padding: 4px 10px; font-size: 11px; font-family: inherit;
      cursor: pointer; white-space: nowrap; transition: all .15s;
    }
    .sort-near-btn:hover { border-color: var(--ink); }
    .sort-near-btn.on { background: var(--move); color: #fff; border-color: var(--move); font-weight: 700; }
    #fav-filter-btn.on { background: #e0447c; border-color: #e0447c; }
    #sort-select {
      background: var(--soft); border: 1.5px solid var(--border); color: var(--muted);
      border-radius: 14px; padding: 4px 8px; font-size: 11px; font-family: inherit;
      cursor: pointer; outline: none;
    }
    .item-fav { font-size: 10px; }
    .iw-sub-btn {
      flex: 1; padding: 6px 4px; border: 1.5px solid var(--border); border-radius: 6px;
      background: var(--soft); color: var(--ink); font-size: 11px;
      font-family: inherit; cursor: pointer; transition: filter .1s; white-space: nowrap;
    }
    .iw-sub-btn:hover { filter: brightness(.95); }
    .iw-sub-btn.fav-on { border-color: #e0447c; color: #e0447c; background: #fff0f5; }
    .list { overflow-y: auto; flex: 1; overscroll-behavior: contain; -webkit-overflow-scrolling: touch; }
    .list-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 11px 16px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background .1s;
    }
    .list-item:hover { background: var(--soft); }
    .list-item.active { background: var(--soft); }
    .dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
    .dot.noodle { background: var(--noodle); } .dot.rice { background: var(--rice); } .dot.etc { background: var(--etc); }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-size: 13px; font-weight: 700; }
    .item-menu { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
    .item-tag { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 10px; }
    .item-tag.noodle { background:#fff4f0; color:var(--noodle); }
    .item-tag.rice   { background:#f0faf4; color:var(--rice); }
    .item-tag.etc    { background:#f5f0ff; color:var(--etc); }
    .item-stars { font-size: 11px; color: #f6a623; }
    .item-tagbadge { font-size: 10px; color: var(--muted); background:var(--chip); padding: 1px 6px; border-radius: 8px; }
    .item-dist { font-size: 10px; color: var(--move); font-weight: 700; }

    /* ── 지도 ── */
    #map { flex: 1; }

    /* ── 인포윈도우 ── */
    .iw {
      background: var(--surface); border-radius: 12px;
      padding: 14px 16px; min-width: 230px; max-width: 290px;
      box-shadow: 0 4px 20px rgba(0,0,0,.15);
      font-family: 'Noto Sans KR', sans-serif; color: var(--ink);
    }
    .iw-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; gap: 8px; }
    .iw-name { font-size: 14px; font-weight: 700; color: var(--ink); text-decoration: none; }
    .iw-name:hover { text-decoration: underline; color: #0070cc; }
    .iw-naver-badge { font-size: 10px; background: #03c75a; color: #fff; padding: 2px 6px; border-radius: 4px; white-space: nowrap; }
    .iw-avg { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .iw-avg-stars { font-size: 15px; color: #f6a623; line-height: 1; letter-spacing: 1px; }
    .iw-avg-label { font-size: 11px; color: var(--muted); }
    .iw-myrate { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
    .iw-myrate-label { font-size: 11px; color: var(--muted); }
    .star-row { display: flex; gap: 2px; }
    .star { font-size: 17px; cursor: pointer; color: #ddd; transition: color .1s; line-height: 1; }
    .star.on { color: #f6a623; }
    .iw-menu { font-size: 12px; color: var(--muted); line-height: 1.6; }
    .iw-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    .iw-tag { font-size: 10px; background:var(--chip); color:var(--ink); padding: 2px 8px; border-radius: 10px; }
    .iw-comment { font-size: 11px; color: var(--ink); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); line-height: 1.6; }
    .iw-author { font-size: 10px; color: var(--muted); margin-top: 6px; }
    .iw-actions { display: flex; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
    .iw-del-btn {
      flex: 1; padding: 6px; border: 1.5px solid var(--danger); border-radius: 6px;
      background: #fff5f5; color: var(--danger); font-size: 12px;
      font-family: inherit; cursor: pointer; transition: background .1s;
    }
    .iw-del-btn:hover { background: #ffe0e0; }
    .iw-move-btn {
      flex: 1; padding: 6px; border: 1.5px solid #2563eb; border-radius: 6px;
      background: #eff6ff; color: #2563eb; font-size: 12px;
      font-family: inherit; cursor: pointer; transition: background .1s;
    }
    .iw-move-btn:hover { background: #dbeafe; }

    /* ── 모달 ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      z-index: 100; display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface); border-radius: 16px;
      padding: 24px; width: 360px; max-width: 90vw; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 8px 40px rgba(0,0,0,.2);
      transform: translateY(20px); transition: transform .2s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .modal p.sub { font-size: 12px; color: var(--muted); margin: -8px 0 16px; line-height: 1.5; }
    .form-row { margin-bottom: 12px; }
    .form-row label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 4px; }
    .form-row input, .form-row select, .form-row textarea {
      width: 100%; padding: 9px 12px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 13px; font-family: inherit;
      outline: none; transition: border-color .15s; background: var(--surface); color: var(--ink);
    }
    .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: var(--ink); }
    .form-row textarea { resize: vertical; min-height: 60px; }
    .form-hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .tag-toggles { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag-toggle {
      padding: 5px 11px; border-radius: 14px; border: 1.5px solid var(--border);
      background: var(--soft); font-size: 12px; font-family: inherit; cursor: pointer;
      transition: all .15s; color: var(--muted);
    }
    .tag-toggle.on { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }
    .map-pick-btn {
      width: 100%; padding: 8px; border: 1.5px dashed var(--border);
      border-radius: 8px; background: var(--soft); font-size: 12px;
      font-family: inherit; cursor: pointer; color: var(--muted);
      transition: border-color .15s;
    }
    .map-pick-btn:hover { border-color: var(--ink); color: var(--ink); }
    .map-pick-btn.picking { border-color: var(--noodle); color: var(--noodle); background: #fff4f0; }
    .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
    .btn-cancel {
      flex: 1; padding: 10px; border: 1.5px solid var(--border);
      border-radius: 8px; background: var(--surface); color: var(--ink); font-size: 13px;
      font-family: inherit; cursor: pointer;
    }
    .btn-submit {
      flex: 2; padding: 10px; border: none;
      border-radius: 8px; background: var(--accent); color: #fff;
      font-size: 13px; font-family: inherit; cursor: pointer; font-weight: 700;
    }
    .btn-submit:hover { opacity: .85; }

    /* 지도 위 안내 배너 */
    #pick-banner {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      background: #2563eb; color: #fff; padding: 8px 16px;
      border-radius: 20px; font-size: 13px; z-index: 50;
      pointer-events: all; box-shadow: 0 2px 12px rgba(0,0,0,.2);
      display: none; align-items: center; gap: 4px; white-space: nowrap;
    }
    #pick-banner.show { display: flex; }

    /* 업데이트 알림 배너 */
    #update-banner {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(110px);
      background: var(--surface); color: var(--ink);
      border: 1.5px solid var(--border); border-radius: 14px;
      padding: 12px 16px; z-index: 150;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 6px 24px rgba(0,0,0,.25);
      font-size: 13px; white-space: nowrap;
      transition: transform .3s cubic-bezier(.2,1.1,.4,1);
    }
    #update-banner.show { transform: translateX(-50%) translateY(0); }
    #update-banner button {
      background: var(--noodle); color: #fff; border: none; border-radius: 8px;
      padding: 8px 14px; font-size: 13px; font-weight: 700;
      font-family: inherit; cursor: pointer;
    }
    #update-banner button:hover { opacity: .85; }
    #update-banner .later {
      background: none; color: var(--muted); font-weight: 400; padding: 8px 4px;
    }

    /* 상태 토스트 */
    #toast {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--accent); color: #fff; padding: 10px 18px; border-radius: 22px;
      font-size: 13px; z-index: 80; box-shadow: 0 4px 16px rgba(0,0,0,.25);
      opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .map-wrap { flex: 1; position: relative; }

    /* ── 모바일: 사이드바를 바텀시트로 ── */
    @media (max-width: 640px) {
      .search-wrap input { width: 130px; }
      .body { display: block; }
      .map-wrap { position: absolute; inset: 0; }
      .sidebar {
        position: absolute; left: 0; right: 0; bottom: 0; width: 100%;
        height: 62vh; z-index: 60; border-right: none;
        border-top: 1px solid var(--border); border-radius: 16px 16px 0 0;
        box-shadow: 0 -4px 20px rgba(0,0,0,.18);
        transform: translateY(calc(62vh - 96px));
        transition: transform .28s cubic-bezier(.25,.8,.25,1);
        will-change: transform;
      }
      .sidebar.expanded { transform: translateY(0); }
      .sheet-handle {
        display: block; width: 140px; margin: 0 auto; padding: 10px 0 6px;
        cursor: pointer;
      }
      .sheet-handle::before {
        content: ''; display: block; width: 44px; height: 5px;
        border-radius: 3px; background: var(--border); margin: 0 auto;
      }
      .sidebar-header { cursor: pointer; }
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

// ─────────────────────────────────────────────
// 설정
// ─────────────────────────────────────────────
const SUPABASE_URL = 'https://kvxprsqdqiazxpcdhfiu.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2eHByc3FkcWlhenhwY2RoZml1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NzA2MzQsImV4cCI6MjA5NzM0NjYzNH0.1FYKu070t22fYIzJa_nx3oFrSugGiOu_VEWSOpvWpFY';

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ─────────────────────────────────────────────
// 태그 시스템
// ─────────────────────────────────────────────
const TAGS = [
  { id: 'waiting',  label: '⏳ 웨이팅 있음' },
  { id: 'solo',     label: '🙋 혼밥 가능'   },
  { id: 'cheap',    label: '💸 가성비'       },
  { id: 'spicy',    label: '🌶 매운맛'       },
  { id: 'takeout',  label: '🥡 포장 가능'   },
  { id: 'open24',   label: '🕛 24시 영업'   },
];
const TAG_LABEL = Object.fromEntries(TAGS.map(t => [t.id, t.label]));

// ─────────────────────────────────────────────
// 기본 데이터 (Supabase 로드 실패 시 폴백)
// ─────────────────────────────────────────────
const DEFAULT_PLACES = [
  { id:'d1', cat:'noodle', name:'후암 쌀국수 (아시안)', menu:'소고기 쌀국수 9,500원', comment:'후암동 / 완자도 넣어줌 맛있음', lat:37.5485, lng:126.9759, tags:[], added_by:'기본데이터' },
];

// ─────────────────────────────────────────────
// 상태
// ─────────────────────────────────────────────
let places = [];
let summaries = {};     // place_id → { average, count }
let myRatings = {};     // place_id → score
let currentUserId = null;
let nickname = localStorage.getItem('matzip_nickname') || '';
let readOnly = false;

let activeFilter = 'all';
let activeTagFilter = null;
let openIW = null;
let openPlaceId = null;
let activeListItem = null;
const markerMap = {};    // id → { marker, iw }
const listItemMap = {};  // id → element

let myLoc = null;          // { lat, lng }
let sortMode = 'default';  // default | dist | rating | name
let favs = new Set((() => { try { return JSON.parse(localStorage.getItem('matzip_favs') || '[]'); } catch { return []; } })());
let favOnly = false;
let lastRecCat = 'all';

// ─────────────────────────────────────────────
// 공용 헬퍼
// ─────────────────────────────────────────────
function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
    ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}
function avgStars(avg) {
  const n = Math.round(avg || 0);
  return '★'.repeat(n) + '☆'.repeat(5 - n);
}
function catEmoji(cat) { return cat === 'noodle' ? '🍜' : cat === 'rice' ? '🍚' : '🎪'; }
function catColor(cat) { return cat === 'noodle' ? '#e85d26' : cat === 'rice' ? '#2c7a4b' : '#7b5ea7'; }
function catLabel(cat) { return cat === 'noodle' ? '면류' : cat === 'rice' ? '밥류+a' : '기타'; }

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000, toR = x => x * Math.PI / 180;
  const dLat = toR(lat2 - lat1), dLng = toR(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toR(lat1))*Math.cos(toR(lat2))*Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}
function fmtDist(m) { return m >= 1000 ? (m/1000).toFixed(1) + 'km' : Math.round(m) + 'm'; }
function computeDistances() {
  if (!myLoc) return;
  places.forEach(p => { p._dist = haversine(myLoc.lat, myLoc.lng, p.lat, p.lng); });
}

function sortedPlaces() {
  const arr = [...places];
  if (sortMode === 'dist' && myLoc) arr.sort((a, b) => (a._dist ?? 1e12) - (b._dist ?? 1e12));
  else if (sortMode === 'rating') arr.sort((a, b) => {
    const sa = summaries[a.id], sb = summaries[b.id];
    return ((sb?.average) || 0) - ((sa?.average) || 0) || ((sb?.count) || 0) - ((sa?.count) || 0);
  });
  else if (sortMode === 'name') arr.sort((a, b) => a.name.localeCompare(b.name, 'ko'));
  return arr;
}

// 증분 추가/수정 후 현재 정렬 기준대로 목록 DOM 재배치
function resortList() {
  const listEl = document.getElementById('list');
  sortedPlaces().forEach(p => { const it = listItemMap[p.id]; if (it) listEl.appendChild(it); });
}

// ─────────────────────────────────────────────
// 지도 초기화
// ─────────────────────────────────────────────
const map = new naver.maps.Map('map', {
  center: new naver.maps.LatLng(37.5545, 126.9730),
  zoom: 15,
  mapTypeId: naver.maps.MapTypeId.NORMAL
});

// 모바일에서 시트가 접히는 순간 발생하는 고스트 클릭이 인포윈도우를 닫지 않도록 잠시 무시
let suppressMapClickUntil = 0;

naver.maps.Event.addListener(map, 'click', () => {
  if (Date.now() < suppressMapClickUntil) return;
  if (!movingId && !isDraggingNew) {
    if (openIW) { openIW.close(); openIW = null; openPlaceId = null; }
    if (activeListItem) { activeListItem.classList.remove('active'); activeListItem = null; }
  }
});

// ─────────────────────────────────────────────
// 토스트
// ─────────────────────────────────────────────
let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

// ─────────────────────────────────────────────
// 인포윈도우 컨텐츠
// ─────────────────────────────────────────────
function buildIwContent(p) {
  const naverSearchUrl = `https://map.naver.com/v5/search/${encodeURIComponent(p.name)}`;
  const sum = summaries[p.id];
  const avg = sum ? sum.average : 0;
  const cnt = sum ? sum.count : 0;
  const mine = myRatings[p.id] || 0;

  // id도 속성에 들어가므로 반드시 이스케이프 (onclick 문자열 주입 방지 → 이벤트 위임 사용)
  const pid = esc(p.id);
  const myStars = [1,2,3,4,5].map(n =>
    `<span class="star ${n<=mine?'on':''}" data-id="${pid}" data-n="${n}" role="button" tabindex="0" aria-label="${n}점 주기">★</span>`
  ).join('');

  const tagBadges = (p.tags && p.tags.length)
    ? `<div class="iw-tags">${p.tags.map(t => `<span class="iw-tag">${esc(TAG_LABEL[t] || t)}</span>`).join('')}</div>`
    : '';

  return `
    <div class="iw">
      <div class="iw-title-row">
        <a class="iw-name" href="${naverSearchUrl}" target="_blank" rel="noopener">${esc(p.name)}</a>
        <a href="${naverSearchUrl}" target="_blank" rel="noopener" class="iw-naver-badge">네이버지도</a>
      </div>
      <div class="iw-avg">
        <span class="iw-avg-stars">${avgStars(avg)}</span>
        <span class="iw-avg-label">${cnt > 0 ? `${avg}점 (${cnt}명)` : '평가 없음'}</span>
      </div>
      <div class="iw-myrate">
        <span class="iw-myrate-label">내 평가:</span>
        <div class="star-row" id="stars-${pid}">${myStars}</div>
      </div>
      <div class="iw-menu">${esc(p.menu || '')}</div>
      ${tagBadges}
      ${p.comment ? `<div class="iw-comment">💬 ${esc(p.comment)}</div>` : ''}
      <div class="iw-author">추가한 사람: ${esc(p.added_by || '익명')}</div>
      <div class="iw-actions">
        <button class="iw-sub-btn" data-action="nav" data-id="${pid}">🧭 길찾기</button>
        <button class="iw-sub-btn" data-action="share" data-id="${pid}">🔗 공유</button>
        <button class="iw-sub-btn ${favs.has(p.id)?'fav-on':''}" data-action="fav" data-id="${pid}" aria-label="찜 토글">${favs.has(p.id)?'❤️ 찜함':'🤍 찜'}</button>
      </div>
      <div class="iw-actions" style="border-top:none;padding-top:0;">
        <button class="iw-move-btn" data-action="move" data-id="${pid}">📍 위치 수정</button>
        <button class="iw-del-btn" data-action="del" data-id="${pid}">🗑 삭제</button>
      </div>
    </div>`;
}

function markerIcon(p) {
  return {
    content: `<div style="width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 6px rgba(0,0,0,.25);cursor:pointer;background:${catColor(p.cat)}">${catEmoji(p.cat)}</div>`,
    anchor: new naver.maps.Point(15, 30)
  };
}

function listItemInner(p) {
  const sum = summaries[p.id];
  const tagBadgesHtml = (p.tags || []).slice(0,3)
    .map(t => `<span class="item-tagbadge">${esc(TAG_LABEL[t] || t)}</span>`).join('');
  const distHtml = (myLoc && p._dist != null) ? `<span class="item-dist">${fmtDist(p._dist)}</span>` : '';
  return `
    <div class="dot ${p.cat}"></div>
    <div class="item-info">
      <div class="item-name">${esc(p.name)}</div>
      <div class="item-menu">${esc(p.menu || '')}</div>
      <div class="item-meta">
        <span class="item-tag ${p.cat}">${catLabel(p.cat)}</span>
        ${favs.has(p.id) ? '<span class="item-fav">❤️</span>' : ''}
        ${sum && sum.count>0 ? `<span class="item-stars">${avgStars(sum.average)}</span><span class="item-tagbadge">${sum.average}</span>` : ''}
        ${distHtml}
        ${tagBadgesHtml}
      </div>
    </div>`;
}

// ─────────────────────────────────────────────
// 마커/리스트 — 증분 단위 조작
// ─────────────────────────────────────────────
function addPlaceToUI(p) {
  const marker = new naver.maps.Marker({
    position: new naver.maps.LatLng(p.lat, p.lng),
    map, icon: markerIcon(p), title: p.name
  });
  const iw = new naver.maps.InfoWindow({
    content: buildIwContent(p),
    borderWidth: 0, backgroundColor: 'transparent',
    anchorSize: new naver.maps.Size(0,0),
    pixelOffset: new naver.maps.Point(0, -36)
  });
  naver.maps.Event.addListener(marker, 'click', () => openInfo(p.id));
  markerMap[p.id] = { marker, iw };

  const item = document.createElement('div');
  item.className = 'list-item';
  item.dataset.id = p.id;
  item.innerHTML = listItemInner(p);
  item.onclick = () => openInfo(p.id);
  document.getElementById('list').appendChild(item);
  listItemMap[p.id] = item;
}

function updatePlaceUI(p) {
  const entry = markerMap[p.id];
  if (!entry) { addPlaceToUI(p); return; }
  entry.marker.setPosition(new naver.maps.LatLng(p.lat, p.lng));
  entry.marker.setIcon(markerIcon(p));
  entry.marker.setTitle(p.name);
  entry.iw.setContent(buildIwContent(p));
  if (openPlaceId === p.id) entry.iw.open(map, entry.marker);
  const item = listItemMap[p.id];
  if (item) item.innerHTML = listItemInner(p);
}

function removePlaceFromUI(id) {
  const entry = markerMap[id];
  if (entry) { entry.iw.close(); entry.marker.setMap(null); delete markerMap[id]; }
  const item = listItemMap[id];
  if (item) { item.remove(); delete listItemMap[id]; }
  if (openPlaceId === id) { openIW = null; openPlaceId = null; }
}

function renderAll() {
  Object.values(markerMap).forEach(({ marker, iw }) => { iw.close(); marker.setMap(null); });
  for (const k in markerMap) delete markerMap[k];
  for (const k in listItemMap) delete listItemMap[k];
  document.getElementById('list').innerHTML = '';

  if (myLoc) computeDistances();
  sortedPlaces().forEach(addPlaceToUI);

  applyFilter();
  updateCountLabel();
  if (openPlaceId && markerMap[openPlaceId]) openInfo(openPlaceId);
}

function updateCountLabel() {
  let visible = 0;
  const query = document.getElementById('search-input').value.trim().toLowerCase();
  places.forEach(p => {
    if (matchesFilter(p, query)) visible++;
  });
  document.getElementById('count-label').textContent =
    `숙대 · 서울역 · 남대문 일대 · ${visible}곳`;
}

// ─────────────────────────────────────────────
// 인포윈도우 열기
// ─────────────────────────────────────────────
function openInfo(id) {
  if (openIW) openIW.close();
  if (activeListItem) activeListItem.classList.remove('active');

  const entry = markerMap[id];
  if (!entry) return;
  const { marker, iw } = entry;
  iw.open(map, marker);
  openIW = iw;
  openPlaceId = id;
  map.panTo(marker.getPosition());

  const mobile = window.matchMedia('(max-width: 640px)').matches;
  const item = listItemMap[id];
  if (item) {
    item.classList.add('active');
    if (!mobile) item.scrollIntoView({ block:'nearest' });   // 모바일에선 시트가 접히므로 스크롤 불필요(버벅임 방지)
    activeListItem = item;
  }

  // 탭 직후 지도로 새는 고스트 클릭 차단 (팝업이 열리자마자 닫히는 문제)
  suppressMapClickUntil = Date.now() + 700;

  // 모바일: 탭 이벤트가 완전히 끝난 뒤 시트를 접어야 클릭이 지도로 새지 않음
  if (mobile) setTimeout(() => document.getElementById('sidebar').classList.remove('expanded'), 250);
}

// ─────────────────────────────────────────────
// 별점 (멀티유저 평균)
// ─────────────────────────────────────────────
async function setRating(id, n) {
  if (readOnly) { toast('별점은 로그인(익명) 활성화 후 가능해요'); return; }
  myRatings[id] = n;
  const starsEl = document.getElementById(`stars-${id}`);
  if (starsEl) starsEl.querySelectorAll('.star').forEach(s => s.classList.toggle('on', parseInt(s.dataset.n) <= n));

  const { error } = await supabase.from('ratings').upsert(
    { place_id: id, user_id: currentUserId, score: n },
    { onConflict: 'place_id,user_id' }
  );
  if (error) { toast('별점 저장 실패'); console.error(error); return; }

  const { data } = await supabase.from('rating_summary')
    .select('average, count').eq('place_id', id).maybeSingle();
  summaries[id] = data ? { average: Number(data.average), count: data.count } : { average: n, count: 1 };
  refreshRatingUI(id);
  toast('별점 저장됨 ⭐');
}

function refreshRatingUI(id) {
  const entry = markerMap[id];
  const p = places.find(x => x.id === id);
  if (entry && p) {
    entry.iw.setContent(buildIwContent(p));
    if (openPlaceId === id) entry.iw.open(map, entry.marker);
  }
  const item = listItemMap[id];
  const meta = item && item.querySelector('.item-meta');
  const sum = summaries[id];
  if (meta) {
    const existing = meta.querySelector('.item-stars');
    if (sum && sum.count > 0) {
      const html = `<span class="item-stars">${avgStars(sum.average)}</span>`;
      if (existing) existing.outerHTML = html;
      else meta.insertAdjacentHTML('afterbegin', html);
    } else if (existing) existing.remove();
  }
}

// ─────────────────────────────────────────────
// 삭제
// ─────────────────────────────────────────────
async function deletePlace(id) {
  if (readOnly) { toast('삭제는 로그인(익명) 활성화 후 가능해요'); return; }
  const p = places.find(x => x.id === id);
  if (!p) return;
  // 모두의 데이터가 지워지므로 매장명 입력으로 이중 확인
  const typed = prompt(`모든 사용자에게서 삭제됩니다.\n정말 삭제하려면 매장명을 그대로 입력하세요:\n\n${p.name}`);
  if (typed === null) return;
  if (typed.trim() !== p.name) { toast('매장명이 일치하지 않아 취소했어요'); return; }
  const { error } = await supabase.from('places').delete().eq('id', id);
  if (error) { toast('삭제 실패'); console.error(error); return; }
  places = places.filter(p => p.id !== id);
  removePlaceFromUI(id);
  updateCountLabel();
  toast('삭제됨');
}

// ─────────────────────────────────────────────
// 위치 수정 (드래그)
// ─────────────────────────────────────────────
let movingId = null;

function startMovePlace(id) {
  if (readOnly) { toast('위치 수정은 로그인(익명) 활성화 후 가능해요'); return; }
  if (openIW) { openIW.close(); openIW = null; openPlaceId = null; }
  movingId = id;
  const place = places.find(p => p.id === id);
  if (!place) return;
  const { marker } = markerMap[id];

  marker.setDraggable(true);
  marker.setCursor('grab');
  const el = marker.getElement();
  if (el) { el.style.filter = 'drop-shadow(0 0 8px #2563eb)'; el.style.transform = 'scale(1.3)'; el.style.transition = 'transform .15s'; }

  document.getElementById('pick-banner-text').textContent =
    `📍 [${place.name}] 핀을 드래그해서 새 위치로 이동하세요`;
  document.getElementById('pick-confirm-btn').textContent = '✅ 저장';
  document.getElementById('pick-banner').classList.add('show');
}

async function confirmDrag() {
  if (movingId) {
    const { marker } = markerMap[movingId];
    const pos = marker.getPosition();
    const place = places.find(p => p.id === movingId);
    const savedId = movingId;
    if (place) {
      place.lat = pos.lat();
      place.lng = pos.lng();
      const { error } = await supabase.from('places')
        .update({ lat: place.lat, lng: place.lng }).eq('id', savedId);
      if (error) { toast('위치 저장 실패'); console.error(error); }
      else toast('위치 저장됨 📍');
    }
    stopMove();
    if (place) updatePlaceUI(place);
    applyFilter();
    setTimeout(() => { if (savedId) openInfo(savedId); }, 200);
  } else if (isDraggingNew) {
    const pos = tempDragMarker.getPosition();
    pickedLat = pos.lat();
    pickedLng = pos.lng();
    stopAddDrag();
    document.getElementById('modal-overlay').classList.add('open');
    document.getElementById('pick-hint').textContent = `📍 ${pickedLat.toFixed(6)}, ${pickedLng.toFixed(6)}`;
    document.getElementById('pick-btn').textContent = '✅ 위치 재조정';
    document.getElementById('pick-btn').classList.remove('picking');
  }
}

function cancelDrag() {
  if (movingId) {
    const place = places.find(p => p.id === movingId);
    if (place) markerMap[movingId].marker.setPosition(new naver.maps.LatLng(place.lat, place.lng));
    stopMove();
    applyFilter();
  } else if (isDraggingNew) {
    stopAddDrag();
    document.getElementById('modal-overlay').classList.add('open');
  }
}

function stopMove() {
  if (movingId && markerMap[movingId]) {
    const { marker } = markerMap[movingId];
    marker.setDraggable(false);
    marker.setCursor('pointer');
    const el = marker.getElement();
    if (el) { el.style.filter = ''; el.style.transform = ''; }
  }
  movingId = null;
  document.getElementById('pick-banner').classList.remove('show');
}

// ─────────────────────────────────────────────
// 필터 + 검색 + 태그
// ─────────────────────────────────────────────
function matchesFilter(p, query) {
  const matchCat  = activeFilter === 'all' || p.cat === activeFilter;
  const matchTag  = !activeTagFilter || (p.tags || []).includes(activeTagFilter);
  const matchFav  = !favOnly || favs.has(p.id);
  const matchName = !query
    || p.name.toLowerCase().includes(query)
    || (p.menu || '').toLowerCase().includes(query)
    || (p.comment || '').toLowerCase().includes(query)
    || (p.tags || []).some(t => (TAG_LABEL[t] || t).toLowerCase().includes(query));
  return matchCat && matchTag && matchFav && matchName;
}

function filterMarkers(cat) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.classList.contains(cat) || (cat==='all' && b.classList.contains('all')));
  });
  applyFilter();
}

function filterByTag(tagId) {
  activeTagFilter = (activeTagFilter === tagId) ? null : tagId;
  renderTagFilters();
  applyFilter();
}

let searchTimer = null;
function onSearchInput() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(applyFilter, 150);
}

function applyFilter() {
  const query = document.getElementById('search-input').value.trim().toLowerCase();
  places.forEach(p => {
    const show = matchesFilter(p, query);
    markerMap[p.id]?.marker.setVisible(show);
    const item = listItemMap[p.id];
    if (item) item.style.display = show ? '' : 'none';
  });
  // 열린 인포윈도우는 필터 결과에서 빠졌을 때만 닫음 (실시간 갱신 등으로 닫히지 않게)
  if (openPlaceId) {
    const op = places.find(x => x.id === openPlaceId);
    if (!op || !matchesFilter(op, query)) {
      if (openIW) openIW.close();
      openIW = null; openPlaceId = null;
    }
  }
  updateCountLabel();
}

function renderTagFilters() {
  const wrap = document.getElementById('tag-filters');
  wrap.innerHTML = TAGS.map(t =>
    `<button class="tag-chip ${activeTagFilter===t.id?'active':''}" onclick="filterByTag('${t.id}')">${t.label}</button>`
  ).join('');
}

// ─────────────────────────────────────────────
function getLocation() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) return reject(new Error('no-geo'));
    navigator.geolocation.getCurrentPosition(
      pos => { myLoc = { lat: pos.coords.latitude, lng: pos.coords.longitude }; computeDistances(); resolve(myLoc); },
      err => reject(err),
      { enableHighAccuracy: true, timeout: 8000 }
    );
  });
}
function ensureMyLocation() { return myLoc ? Promise.resolve(myLoc) : getLocation(); }

async function onSortChange(mode) {
  if (mode === 'dist') {
    toast('위치 확인 중…');
    try { await getLocation(); }   // 토글할 때마다 최신 위치로 갱신
    catch { toast('위치 권한이 필요해요'); document.getElementById('sort-select').value = sortMode; return; }
  }
  sortMode = mode;
  renderAll();
  if (mode === 'dist') toast('가까운 순으로 정렬됨 📍');
}

// ─────────────────────────────────────────────
// 맛집 추천 (룰렛)
// ─────────────────────────────────────────────
let recommendedId = null;
let spinToken = 0;
let isSpinning = false;

function setGotoEnabled(on) {
  const goto = document.getElementById('rec-goto-btn');
  goto.disabled = !on; goto.style.opacity = on ? '1' : '.4';
}

function openRecommendModal() {
  spinToken++;
  isSpinning = false;
  lastRecCat = 'all';
  document.getElementById('rec-result').innerHTML =
    '<div class="rec-empty">위 카테고리를 선택하면<br>룰렛이 주르르륵 돌아갑니다 🎰</div>';
  recommendedId = null;
  setGotoEnabled(false);
  document.querySelectorAll('.rec-cat').forEach(b => b.classList.toggle('active', b.dataset.cat === 'all'));
  document.getElementById('rec-overlay').classList.add('open');
}

function closeRecommendModal() {
  spinToken++;
  isSpinning = false;
  document.getElementById('rec-overlay').classList.remove('open');
}

async function recommendByCat(cat) {
  if (isSpinning) return;
  lastRecCat = cat;
  document.querySelectorAll('.rec-cat').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));

  let pool = places.filter(p => cat === 'all' || p.cat === cat);

  // 태그 조건
  const tagSel = document.getElementById('rec-tag').value;
  if (tagSel) pool = pool.filter(p => (p.tags || []).includes(tagSel));

  // 내 주변만
  if (document.getElementById('rec-near').checked) {
    try { await ensureMyLocation(); } catch { toast('위치 권한이 필요해요'); }
    if (myLoc) {
      computeDistances();
      const near = pool.filter(p => p._dist != null && p._dist <= 1500);
      if (near.length) pool = near;
      else toast('주변 1.5km 내 맛집이 없어 전체에서 추천해요');
    }
  }

  if (!pool.length) {
    document.getElementById('rec-result').innerHTML =
      '<div class="rec-empty">해당 조건에 맞는 맛집이 없어요 😢</div>';
    recommendedId = null;
    setGotoEnabled(false);
    return;
  }

  // 별점 평균 가중치 랜덤 (평가 없으면 기본 3점, 직전 추천 제외)
  let candidates = pool.length > 1 && recommendedId ? pool.filter(p => p.id !== recommendedId) : pool;
  if (!candidates.length) candidates = pool;
  const weights = candidates.map(p => {
    const s = summaries[p.id];
    return s && s.count > 0 ? Math.max(0.5, s.average) : 3;
  });
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total, picked = candidates[0];
  for (let i = 0; i < candidates.length; i++) { r -= weights[i]; if (r <= 0) { picked = candidates[i]; break; } }

  spinRoulette(pool, picked);
}

function spinRoulette(pool, picked) {
  const token = ++spinToken;
  isSpinning = true;
  setGotoEnabled(false);
  const resultEl = document.getElementById('rec-result');

  const totalDuration = pool.length > 1 ? 2200 : 600;
  let elapsed = 0;
  let delay = 55;

  function frame(p) {
    resultEl.innerHTML =
      `<div class="rec-spin"><div class="rec-spin-name">${catEmoji(p.cat)} ${esc(p.name)}</div></div>` +
      `<div class="rec-spin-cap">두구두구두구…</div>`;
  }

  function tick() {
    if (token !== spinToken) return;
    frame(pool[Math.floor(Math.random() * pool.length)]);
    elapsed += delay;
    if (elapsed >= totalDuration) {
      frame(picked);
      setTimeout(() => {
        if (token !== spinToken) return;
        recommendedId = picked.id;
        renderRecResult(picked);
        setGotoEnabled(true);
        isSpinning = false;
      }, 240);
      return;
    }
    delay = 55 + Math.pow(elapsed / totalDuration, 2) * 260;
    setTimeout(tick, delay);
  }
  tick();
}

function renderRecResult(p) {
  const s = summaries[p.id];
  const ratingHtml = s && s.count > 0
    ? `<div class="rec-rating">${avgStars(s.average)} ${s.average}점<span class="cnt">(${s.count}명)</span></div>`
    : `<div class="rec-rating" style="color:var(--muted)">평가 없음</div>`;
  const distHtml = (myLoc && p._dist != null) ? `<div class="rec-dist">📍 내 위치에서 ${fmtDist(p._dist)}</div>` : '';
  const tagsHtml = (p.tags && p.tags.length)
    ? `<div class="rec-tags">${p.tags.map(t => `<span class="rec-tag">${esc(TAG_LABEL[t] || t)}</span>`).join('')}</div>`
    : '';
  document.getElementById('rec-result').innerHTML = `
    <div class="rec-card-reveal">
      <div class="rec-card-head">
        <span class="rec-emoji">${catEmoji(p.cat)}</span>
        <span class="rec-name">${esc(p.name)}</span>
        <span class="rec-cat-tag ${p.cat}">${catLabel(p.cat)}</span>
      </div>
      ${ratingHtml}
      ${distHtml}
      <div class="rec-menu">${esc(p.menu || '')}</div>
      ${tagsHtml}
      ${p.comment ? `<div class="rec-comment">💬 ${esc(p.comment)}</div>` : ''}
      <button class="btn-cancel" style="width:100%;margin-top:10px;" onclick="respinRoulette()">🔁 다시 돌리기</button>
    </div>`;
}

function respinRoulette() {
  if (!isSpinning) recommendByCat(lastRecCat);
}

function gotoRecommend() {
  if (!recommendedId) return;
  const id = recommendedId;
  if (activeFilter !== 'all') {
    const p = places.find(x => x.id === id);
    if (p && p.cat !== activeFilter) filterMarkers('all');
  }
  activeTagFilter = null; renderTagFilters();
  document.getElementById('search-input').value = '';
  applyFilter();
  closeRecommendModal();
  setTimeout(() => openInfo(id), 250);
}

// 길찾기 / 공유 / 찜
// ─────────────────────────────────────────────
function openDirections(id) {
  const p = places.find(x => x.id === id);
  if (!p) return;
  const url = `https://map.naver.com/p/directions/-/${p.lng},${p.lat},${encodeURIComponent(p.name)}/-/walk`;
  window.open(url, '_blank', 'noopener');
}

async function copyShareLink(id) {
  const url = `${location.origin}${location.pathname}?place=${encodeURIComponent(id)}`;
  try { await navigator.clipboard.writeText(url); toast('공유 링크 복사됨 🔗'); }
  catch { prompt('아래 링크를 복사하세요', url); }
}

function toggleFav(id) {
  if (favs.has(id)) favs.delete(id); else favs.add(id);
  localStorage.setItem('matzip_favs', JSON.stringify([...favs]));
  const p = places.find(x => x.id === id);
  if (p) updatePlaceUI(p);
  if (favOnly) applyFilter();
  toast(favs.has(id) ? '찜 추가 ❤️' : '찜 해제');
}

function toggleFavFilter() {
  favOnly = !favOnly;
  document.getElementById('fav-filter-btn').classList.toggle('on', favOnly);
  applyFilter();
}

// 인포윈도우 등 동적 HTML의 버튼은 이벤트 위임으로 처리 (id를 onclick 문자열에 넣지 않음)
document.addEventListener('click', e => {
  const star = e.target.closest('.star[data-id]');
  if (star) { setRating(star.dataset.id, parseInt(star.dataset.n)); return; }
  const btn = e.target.closest('[data-action][data-id]');
  if (!btn) return;
  const { action, id } = btn.dataset;
  if (action === 'move') startMovePlace(id);
  else if (action === 'del') deletePlace(id);
  else if (action === 'nav') openDirections(id);
  else if (action === 'share') copyShareLink(id);
  else if (action === 'fav') toggleFav(id);
});
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter' && e.key !== ' ') return;
  const star = e.target && e.target.closest && e.target.closest('.star[data-id]');
  if (star) { e.preventDefault(); setRating(star.dataset.id, parseInt(star.dataset.n)); }
});

// ─────────────────────────────────────────────
// 다크모드 / 모바일 시트
// ─────────────────────────────────────────────
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('matzip_theme', t);
  const b = document.getElementById('theme-btn');
  if (b) b.textContent = t === 'dark' ? '☀️' : '🌙';
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
  applyTheme(cur === 'dark' ? 'light' : 'dark');
}
function toggleSheet() {
  document.getElementById('sidebar').classList.toggle('expanded');
}
function onSidebarHeaderClick(e) {
  // 모바일에서 헤더(정렬버튼 제외) 클릭 시 시트 토글
  if (window.matchMedia('(max-width: 640px)').matches) toggleSheet();
}

// ─────────────────────────────────────────────
// 데이터 로드
// ─────────────────────────────────────────────
function upsertLocalPlace(p) {
  const i = places.findIndex(x => x.id === p.id);
  if (i >= 0) places[i] = { ...places[i], ...p };
  else places.push(p);
}

async function loadPlaces() {
  const { data, error } = await supabase.from('places').select('*').order('created_at', { ascending: true });
  if (error || !data) { console.error('places load error', error); if (!places.length) places = JSON.parse(JSON.stringify(DEFAULT_PLACES)); return; }
  places = data;
}

async function loadSummaries() {
  const { data } = await supabase.from('rating_summary').select('place_id, average, count');
  summaries = {};
  (data || []).forEach(s => { summaries[s.place_id] = { average: Number(s.average), count: s.count }; });
}

async function loadMyRatings() {
  if (!currentUserId) { myRatings = {}; return; }
  const { data } = await supabase.from('ratings').select('place_id, score').eq('user_id', currentUserId);
  myRatings = {};
  (data || []).forEach(r => { myRatings[r.place_id] = r.score; });
}

// ─────────────────────────────────────────────
// 실시간 — 증분 반영
// ─────────────────────────────────────────────
function onPlacesChange(payload) {
  const ev = payload.eventType || payload.type;
  if (ev === 'INSERT' || ev === 'UPDATE') {
    const p = payload.new;
    if (!p) return;
    upsertLocalPlace(p);
    if (myLoc) p._dist = haversine(myLoc.lat, myLoc.lng, p.lat, p.lng);
    if (markerMap[p.id]) updatePlaceUI(p); else addPlaceToUI(p);
    resortList();
    applyFilter();
  } else if (ev === 'DELETE') {
    const id = payload.old && payload.old.id;
    if (!id) return;
    places = places.filter(x => x.id !== id);
    removePlaceFromUI(id);
    updateCountLabel();
  }
}

async function onRatingsChange(payload) {
  const row = payload.new || payload.old;
  const placeId = row && row.place_id;
  if (!placeId) return;
  const { data } = await supabase.from('rating_summary')
    .select('average, count').eq('place_id', placeId).maybeSingle();
  if (data) summaries[placeId] = { average: Number(data.average), count: data.count };
  else delete summaries[placeId];
  if (payload.new && payload.new.user_id === currentUserId) myRatings[placeId] = payload.new.score;
  refreshRatingUI(placeId);
}

function subscribeRealtime() {
  supabase.channel('matzip-realtime')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'places' }, onPlacesChange)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'ratings' }, onRatingsChange)
    .subscribe();
}

// ─────────────────────────────────────────────
// 익명 로그인
// ─────────────────────────────────────────────
async function signIn() {
  const { data: { user } } = await supabase.auth.getUser();
  if (user) { currentUserId = user.id; return; }
  const { error } = await supabase.auth.signInAnonymously();
  if (error) throw error;
  const { data: { user: u2 } } = await supabase.auth.getUser();
  currentUserId = u2?.id || null;
  if (!currentUserId) readOnly = true;
}

// ─────────────────────────────────────────────
// 초기화
// ─────────────────────────────────────────────
async function init() {
  renderTagFilters();
  updateNickBtn();
  document.getElementById('rec-tag').innerHTML =
    '<option value="">🏷 태그 무관 (전체)</option>' + TAGS.map(t => `<option value="${t.id}">${t.label}</option>`).join('');
  applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light');

  if (!nickname) openNicknameModal();

  try { await signIn(); }
  catch (e) { console.warn('익명 로그인 실패 — 읽기 전용 모드', e); readOnly = true; toast('읽기 전용 모드 (익명 로그인 비활성)'); }

  await Promise.all([loadPlaces(), loadSummaries(), loadMyRatings()]);
  renderAll();
  subscribeRealtime();

  // 공유 딥링크 (?place=id)
  const deepId = new URLSearchParams(location.search).get('place');
  if (deepId && markerMap[deepId]) setTimeout(() => openInfo(deepId), 300);

  // PWA 서비스워커 + 업데이트 감지
  if ('serviceWorker' in navigator) {
    try { await registerSW(); }
    catch (e) { console.warn('SW 등록 실패', e); }
  }
}

// ─────────────────────────────────────────────
// 업데이트 알림 (새 배포 감지 → 팝업)
// ─────────────────────────────────────────────
let waitingSW = null;
let updateAccepted = false;   // '업데이트' 승인 시에만 리로드 (최초 설치 controllerchange 오작동 방지)

function showUpdateBanner(worker) {
  waitingSW = worker;
  document.getElementById('update-banner').classList.add('show');
}

function applyUpdate() {
  document.getElementById('update-banner').classList.remove('show');
  updateAccepted = true;
  if (waitingSW) waitingSW.postMessage({ type: 'SKIP_WAITING' });
}

function dismissUpdate() {
  document.getElementById('update-banner').classList.remove('show');
}

async function registerSW() {
  const reg = await navigator.serviceWorker.register('sw.js');

  // 이미 대기 중인 새 버전이 있으면 즉시 알림
  if (reg.waiting && navigator.serviceWorker.controller) showUpdateBanner(reg.waiting);

  // 새 버전이 설치되는 순간 감지
  reg.addEventListener('updatefound', () => {
    const nw = reg.installing;
    if (!nw) return;
    nw.addEventListener('statechange', () => {
      if (nw.state === 'installed' && navigator.serviceWorker.controller) showUpdateBanner(nw);
    });
  });

  // 업데이트 승인 → 새 워커 활성화 → 자동 새로고침
  // (최초 설치 시 clients.claim()으로도 controllerchange가 발생하므로 승인 여부 확인)
  let reloading = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (!updateAccepted || reloading) return;
    reloading = true;
    location.reload();
  });

  // 탭을 오래 열어둔 사용자도 감지: 탭 복귀 시 + 30분마다 체크
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) reg.update().catch(() => {});
  });
  setInterval(() => reg.update().catch(() => {}), 30 * 60 * 1000);
}

// ─────────────────────────────────────────────
// 전역 핸들러 등록 (onclick용)
// ─────────────────────────────────────────────
Object.assign(window, {
  filterMarkers, filterByTag, onSearchInput, openInfo, setRating, deletePlace,
  startMovePlace, confirmDrag, cancelDrag, applyFilter,
  openAddModal, closeAddModal, startPicking, submitAdd, toggleTag,
  openNicknameModal, closeNicknameModal, saveNickname,
  openRecommendModal, closeRecommendModal, recommendByCat, gotoRecommend, respinRoulette,
  toggleTheme, toggleSheet, onSidebarHeaderClick, onSortChange, toggleFavFilter,
  applyUpdate, dismissUpdate
});

// 테스트 훅 (헤드리스 검증용)
window.__matzip = {
  get places(){ return places; },
  get summaries(){ return summaries; },
  get openPlaceId(){ return openPlaceId; },
  get favs(){ return [...favs]; },
  buildIwContent, onPlacesChange, onRatingsChange, esc, showUpdateBanner
};

init();
</script>
